# Transparent MITM: intercept the sandbox's redirected 80/443 and ssl-bump 443.
# The sandbox shares this container's network namespace, so its traffic arrives
# here after the nat-OUTPUT REDIRECT installed by entrypoint.sh.
visible_hostname gemma4-mitm

# A regular forward-proxy port bound to loopback. Squid needs at least one
# non-intercept port for its own internal URLs/error pages (without it, startup
# fails at mimeLoadIcon with "No forward-proxy ports configured"). Loopback-only
# so it isn't an open proxy on the bridge IP; anything using it is still bumped.
http_port  127.0.0.1:3128

# Intercept ports (targets of the iptables REDIRECT), bound to IPv4 — the netns
# is IPv4-only (IPv6 is disabled so it can't bypass the IPv4 interception).
# intercept mode recovers the original dst via SO_ORIGINAL_DST (needs
# --enable-linux-netfilter).
http_port  0.0.0.0:3129 intercept
https_port 0.0.0.0:3130 intercept ssl-bump \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=4MB \
    tls-cert=/etc/squid/ssl/mitm-ca.pem

# Mint per-host leaf certs signed by the MITM CA, cached on disk.
sslcrtd_program /usr/local/squid/libexec/security_file_certgen -s /var/spool/squid/ssl_db -M 4MB
sslcrtd_children 5

# Peek at the TLS ClientHello (SNI) to name the leaf, then bump everything.
acl step1 at_step SslBump1
ssl_bump peek step1
ssl_bump bump all

# Verify the REAL upstream certificate against the system trust store — a bad
# origin cert fails the bump, so the sandbox fails closed in both directions.
tls_outgoing_options cafile=/etc/ssl/certs/ca-certificates.crt

# We inspect, we don't cache.
cache deny all
pid_filename /var/spool/squid/squid.pid
coredump_dir /var/spool/squid

# Squid drops to the squid user and rejects /dev/* log targets (parent-dir
# check), so both logs go to squid-writable files. The entrypoint tails the
# access log to the container's stdout, and `squid -d1` streams startup/errors
# to stderr, so `docker logs` still shows requests and diagnostics.
access_log stdio:/var/spool/squid/access.log squid
cache_log /var/spool/squid/cache.log

# --- ICAP web-policy adaptation -------------------------------------------
# Vector every request through the in-proxy Python policy server (icap_server.py
# on 127.0.0.1:1344): REQMOD can block/redirect/modify requests, RESPMOD can
# rewrite/redact response bodies. bypass=off makes an ICAP outage FAIL CLOSED
# (Squid errors the request) rather than leaking un-adapted traffic.
icap_enable on
icap_preview_enable on
icap_preview_size 4096

# Bumped intercept requests are origin-form (no scheme); tell the ICAP server
# the scheme via a meta header keyed on which intercept port received it.
acl port_https localport 3130
adaptation_meta X-Gemma-Scheme https port_https
adaptation_meta X-Gemma-Scheme http  !port_https

icap_service service_req  reqmod_precache  icap://127.0.0.1:1344/reqmod  bypass=off on-overload=block
icap_service service_resp respmod_precache icap://127.0.0.1:1344/respmod bypass=off on-overload=block
icap_service_failure_limit 10 in 5 minutes
adaptation_access service_req  allow all
adaptation_access service_resp allow all

# Only the sandbox sharing this netns can reach these ports.
http_access allow all
